app = "job-market-trend-analyzer-collector"
primary_region = "iad"
org = "fantisco"

[build]
  dockerfile = "Dockerfile"

[env]
  HEALTH_PORT = "8080"

[processes]
  app = "python collector_consumer.py"

[http_service]
  internal_port = 8080
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
