services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jmta
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: jmta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jmta -d jmta"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: data-collector/Dockerfile
    command: ["python", "collector_consumer.py"]
    environment:
      DATABASE_URL: postgresql://jmta:dev@postgres:5432/jmta
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      MUSE_API_URL: https://www.themuse.com/api/public/jobs
      COLLECTOR_PAGES: "2"
      HEALTH_PORT: "8080"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analyzer:
    build:
      context: .
      dockerfile: data-analyzer/Dockerfile
    command: ["python", "analyzer_consumer.py"]
    environment:
      DATABASE_URL: postgresql://jmta:dev@postgres:5432/jmta
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      HEALTH_PORT: "8080"
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web-api:
    build:
      context: .
      dockerfile: web-api/Dockerfile
    environment:
      DATABASE_URL: postgresql://jmta:dev@postgres:5432/jmta
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
