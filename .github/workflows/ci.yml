name: CI

on:
  pull_request:
  push:
    branches: ['**']

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.7.4
      - name: Lint
        run: ruff check shared data-collector data-analyzer web-api

  python-unit:
    name: Unit tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [data-collector, data-analyzer, web-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.service }}/requirements-dev.txt
      - name: Run unit tests
        run: pytest ${{ matrix.service }} -m "not integration" -q

  python-integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: python-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jmta
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: jmta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jmta -d jmta"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://jmta:dev@localhost:5432/jmta
      USE_REAL_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: web-api/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r web-api/requirements-dev.txt
      - name: Run gateway integration tests
        run: pytest shared/tests -m integration -q
      - name: Run web-api integration tests
        run: pytest web-api/tests/test_api_integration.py -m integration -q

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: https://job-market-trend-analyzer.fly.dev
